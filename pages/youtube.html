<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Art Studio | Jiya</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/typographyAnimations.css" />
    <link rel="stylesheet" href="../css/3d-effects.css" />
  </head>
  <body>
    <div class="floating-orb floating-orb-1"></div>
    <div class="floating-orb floating-orb-2"></div>
    <div class="floating-orb floating-orb-3"></div>

    <div id="navbar"></div>

    <header>
      <h1 class="anim-heading">Art Studio</h1>
    </header>

    <section class="container">
      <!-- Watch Now header with live-update status badge -->
      <div class="watch-now-header">
        <h2 class="anim-subheading">🎨 Watch Now</h2>
        <span id="watchNowStatus" aria-live="polite">Loading…</span>
      </div>

      <!-- Video grid — populated automatically by watchNow.js -->
      <div id="watchNowGrid" class="video-grid anim-stagger-container"></div>

      <div class="youtube-link">
        <a href="https://www.youtube.com/@jiya_the_coolartist" target="_blank">
          ✨ Watch More on YouTube →
        </a>
      </div>
    </section>

    <div id="footer"></div>

    <div class="circle" id="customCursor"></div>

    <script>
      fetch("../components/navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
        });
    </script>

    <script>
      fetch("../components/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>

    <script src="../js/CustomCursor.js"></script>
    <script src="../js/3d-parallax.js"></script>
    <script src="../js/watchNow.js"></script>
  </body>
</html>
