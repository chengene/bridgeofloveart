<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Art Studio | Jiya</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="typographyAnimations.css" />
    <link rel="stylesheet" href="3d-effects.css" />
  </head>
  <body>
    <div class="floating-orb floating-orb-1"></div>
    <div class="floating-orb floating-orb-2"></div>
    <div class="floating-orb floating-orb-3"></div>

    <div id="navbar"></div>

    <header>
      <h1 class="anim-heading">Art Studio</h1>
    </header>

    <section class="container">
      <h2 class="anim-subheading">🎨 Learn & Create with Jiya</h2>

      <div class="video-grid anim-stagger-container">
        <div class="video-card">
          <iframe
            src="https://www.youtube.com/embed/BpiAPcEHvjs"
            frameborder="0"
            allowfullscreen
          >
          </iframe>
          <p>Creative Art Session</p>
        </div>

        <div class="video-card">
          <iframe
            src="https://www.youtube.com/embed/fzvKbRzVEbA"
            frameborder="0"
            allowfullscreen
          >
          </iframe>
          <p>Beautiful Drawing Tutorial</p>
        </div>

        <div class="video-card">
          <iframe
            src="https://www.youtube.com/embed/LNNT-pLVulg"
            frameborder="0"
            allowfullscreen
          >
          </iframe>
          <p>Mandala Art Creation</p>
        </div>
      </div>

      <div class="youtube-link">
        <a href="https://www.youtube.com/@jiya_the_coolartist" target="_blank">
          ✨ Watch More on YouTube →
        </a>
      </div>
    </section>

    <div id="footer"></div>

    <div class="circle" id="customCursor"></div>

    <script>
      fetch("components/navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
        });
    </script>

    <script>
      fetch("components/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>

    <script>
      const customCursor = document.getElementById("customCursor");
      let mouseX = 0;
      let mouseY = 0;
      let cursorX = 0;
      let cursorY = 0;

      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      function animateCursor() {
        const speed = 0.15;

        cursorX += (mouseX - cursorX) * speed;
        cursorY += (mouseY - cursorY) * speed;

        customCursor.style.left = cursorX + "px";
        customCursor.style.top = cursorY + "px";

        requestAnimationFrame(animateCursor);
      }

      animateCursor();

      window.addEventListener("scroll", () => {
        document
          .getElementById("nav-pill")
          .classList.toggle("scrolled", window.scrollY > 10);
      });

      const hamburger = document.getElementById("hamburger");
      const mobileDrop = document.getElementById("mobile-drop");

      hamburger.addEventListener("click", () => {
        hamburger.classList.toggle("open");
        mobileDrop.classList.toggle("open");
      });

      document.querySelectorAll(".nav-center a").forEach((link) => {
        link.addEventListener("click", () => {
          document
            .querySelectorAll(".nav-center a")
            .forEach((l) => l.classList.remove("active"));
          link.classList.add("active");
        });
      });
    </script>
    <script src="3d-parallax.js"></script>
  </body>
</html>
